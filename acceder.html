<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

    <style>
        /* Estilos Generales */
        body {
            background-color: #000; /* Fondo exterior negro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e8eaed;
        }

        /* Contenedor Principal */
        .login-card {
            background-color: #111; /* Gris oscuro de la tarjeta */
            width: 90%;
            max-width: 900px;
            padding: 48px;
            border-radius: 28px;
            display: flex;
            gap: 40px;
        }

        /* Columna Izquierda */
        .info-col {
            flex: 1;
        }

        .google-logo {
            width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 36px;
            font-weight: 400;
            margin: 0 0 16px 0;
        }

        .subtitle {
            font-size: 16px;
            line-height: 1.5;
            color: #e8eaed;
        }

        /* Columna Derecha */
        .form-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Campo de Entrada (Input con label flotante) */
        .input-group {
            position: relative;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid #8ab4f8; /* Color azul de Google */
            border-radius: 4px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        label {
            position: absolute;
            left: 12px;
            top: -10px;
            background-color: #111; /* Mismo que el fondo de la tarjeta */
            padding: 0 5px;
            color: #8ab4f8;
            font-size: 12px;
        }

        /* Enlaces */
        .link {
            color: #8ab4f8;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            margin-top: 8px;
            display: inline-block;
        }

        .guest-info {
            font-size: 14px;
            color: #9aa0a6;
            margin-top: 40px;
            line-height: 1.4;
        }

        /* Botones Inferiores */
        .actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-text {
            color: #8ab4f8;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        .btn-next {
            background-color: #a8c7fa; /* Azul claro botón siguiente */
            color: #062e6f;
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-next:hover {
            background-color: #c2e7ff;
        }

        /* Responsive para móviles */
        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="info-col">
            <img src="images/logo.png" alt="Google" class="google-logo">
            <h1>Inicia sesión</h1>
            <p class="subtitle">Inicia sesión con tu cuenta de Google en nuestra pagina </p>
        </div>

        <div class="form-col">
            <div>
                <div class="input-group">
                    <label>Correo electrónico o teléfono</label>
                    <input type="text" autofocus>
                </div>
                

                <div class="guest-info">
                    ¿No es tu ordenador? Usa el modo Invitado para iniciar sesión de forma privada.<br>
                </div>
            </div>

            <div class="actions">
                <a href="registro.html" class="btn-text">Crear cuenta</a>
                <button class="btn-next">Siguiente</button>
                <a href="index.html" class="btn-text">Volver</a>
            </div>
        </div>
    </div>

</body>
</html>
