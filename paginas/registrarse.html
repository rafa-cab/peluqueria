<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registrarse</title>
    
</head>
<style>
    .container {
    max-width: 100%;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}
.logo{
    width: 225px;
    height: 100px;
}

.barra-rrss{
    background-color: #1a1a1a;
    color: white;
    font-size: 13px;
    padding: 10px 0;
}



.top-links a, .top-links span {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}
 .tarjeta-registro {
            margin: 50px auto;
            max-width: 450px;
            width: 90%;
            padding: 2.5rem;
            position: relative;
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 20px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

       
        .texto-fondo-fantasma {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            font-size: 3.2rem;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            z-index: 0;
            text-align: center;
            text-transform: uppercase;
            pointer-events: none;
        }

        .titulo-principal {
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
            color: #1a1a1a;
            text-align: center;
            font-size: 1.8rem;
        }

        
        .formulario-registro {
            position: relative;
            z-index: 1;
        }

        .grupo-input {
            margin-bottom: 18px;
            text-align: left;
        }

        .grupo-input label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #555;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grupo-input input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .grupo-input input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.2);
        }

        /* Checkbox */
        .opciones-adicionales {
            margin: 20px 0;
            display: flex;
            align-items: center;
        }

        .checkbox-container {
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Botón de Acción */
        .boton-registro {
            width: 100%;
            padding: 15px;
            background-color: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .boton-registro:hover {
            background-color: #d4af37; 
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #777;
        }

        .login-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
<header>
        <div class="barra-rrss">
            <div class="container">
                <div class="social-icons">
                    <span>f</span> <span>t</span> <span>y</span> <span>i</span> <span>in</span>
                </div>
                <div class="top-links">
                    <span>📞 90000000</span>
                    <a href="registrarse.html">Registro</a>
                    <a href="acceder.html">Acceder</a>
                    <a href="../index.html">Pagina Principal</a>
                    
                </div>
            </div>
        </div>
</header>
<div class="tarjeta-registro">
        <span class="texto-fondo-fantasma">MIEMBRO</span>
        <h2 class="titulo-principal">Alta de Cliente</h2>
        
        <form class="formulario-registro">
            <div class="grupo-input">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre y apellidos" required>
            </div>

            <div class="grupo-input">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="grupo-input">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="opciones-adicionales">
                <label class="checkbox-container">
                    <input type="checkbox" name="newsletter">
                    Acepto recibir ofertas y promociones exclusivas
                </label>
            </div>

            <button type="submit" class="boton-registro">UNIRSE AL CLUB</button>
            
            <p class="login-link">¿Ya eres cliente? <a href="acceder.html">Accede aquí</a></p>
        </form>
    </div>
